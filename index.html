<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#0f172a"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-title" content="血壓紀錄"><link rel="manifest" href="manifest.webmanifest"><link rel="apple-touch-icon" href="icons/icon-192.png"><link rel="stylesheet" href="styles.css"><title>血壓紀錄</title></head><body><main class="app"><header><div><p>Blood Pressure Logger</p><h1>血壓紀錄</h1></div></header><section class="card"><h2>新增紀錄</h2><form id="bpForm"><div class="grid"><label>收縮壓<input id="sys" type="number" min="50" max="260" required placeholder="125"></label><label>舒張壓<input id="dia" type="number" min="30" max="180" required placeholder="78"></label><label>心跳<input id="hr" type="number" min="30" max="220" required placeholder="69"></label><label>備註<input id="note" type="text" maxlength="100" placeholder="睡前"></label></div><button class="primary">儲存紀錄</button></form><div id="status" class="status hidden"></div></section><section class="summary"><div><span>最近血壓</span><strong id="latest">—</strong></div><div><span>平均血壓</span><strong id="average">—</strong></div><div><span>紀錄筆數</span><strong id="count">0</strong></div></section><section class="card"><div class="head"><h2>趨勢</h2><select id="range"><option value="7">最近 7 筆</option><option value="14">最近 14 筆</option><option value="30">最近 30 筆</option></select></div><canvas id="chart" width="700" height="320"></canvas></section><section class="card"><div class="head"><h2>歷史紀錄</h2><button id="clearBtn" class="danger">清除全部</button></div><div id="empty">尚無紀錄</div><div class="table-wrap"><table id="table" class="hidden"><thead><tr><th>日期時間</th><th>血壓</th><th>心跳</th><th>備註</th><th></th></tr></thead><tbody></tbody></table></div></section><section class="card actions"><button id="exportBtn">匯出 CSV</button><label class="file">匯入 CSV<input id="importInput" type="file" accept=".csv,text/csv"></label><button id="shareBtn">分享備份</button></section><p class="notice">本工具僅供個人紀錄，不取代醫療診斷。若數值異常或身體不適，請依醫師指示處理。</p></main><script src="app.js"></script></body></html>
