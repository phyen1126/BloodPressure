<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#0f172a"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-title" content="血壓紀錄"><link rel="manifest" href="./manifest.webmanifest"><link rel="apple-touch-icon" href="./icons/icon-192.png"><link rel="stylesheet" href="./styles.css"><title>血壓紀錄 V4</title></head><body><main class="app"><header><div><p>Blood Pressure Logger V4</p><h1>血壓紀錄</h1></div><button id="themeBtn">◐</button></header><section class="card"><h2>新增紀錄</h2><form id="form"><div class="grid"><label>收縮壓<input id="sys" type="number" min="50" max="260" required placeholder="125"></label><label>舒張壓<input id="dia" type="number" min="30" max="180" required placeholder="78"></label><label>心跳<input id="hr" type="number" min="30" max="220" required placeholder="69"></label><label>備註<input id="note" type="text" maxlength="100" placeholder="睡前"></label></div><label class="toggle"><input id="shortcutEnabled" type="checkbox" checked> 儲存後呼叫 BloodPressureToiCloud 捷徑</label><button class="primary">儲存並寫入 iCloud</button></form><div id="status" class="status hidden"></div></section><section class="stats"><div><span>最近血壓</span><strong id="latest">—</strong></div><div><span>平均血壓</span><strong id="average">—</strong></div><div><span>紀錄筆數</span><strong id="count">0</strong></div></section><section class="card"><div class="head"><h2>趨勢</h2><select id="range"><option value="7">最近 7 筆</option><option value="14">最近 14 筆</option><option value="30">最近 30 筆</option></select></div><canvas id="chart" width="700" height="320"></canvas></section><section class="card"><div class="head"><h2>歷史紀錄</h2><input id="search" placeholder="搜尋日期或備註"></div><div id="empty">尚無紀錄</div><div class="table"><table id="history" class="hidden"><thead><tr><th>日期時間</th><th>血壓</th><th>心跳</th><th>備註</th><th></th></tr></thead><tbody></tbody></table></div></section><section class="card actions"><button id="testBtn">測試捷徑</button><button id="exportBtn">匯出完整 CSV</button><button id="clearBtn" class="danger">清除本機資料</button></section><p class="notice">新增紀錄會先保存在此 iPhone，接著呼叫捷徑把最後一筆追加到固定的 iCloud CSV。編輯或刪除本機紀錄不會回寫 CSV。</p></main><script src="./app.js"></script></body></html>
